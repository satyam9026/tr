.rb-body{background:#04101c;border:1px solid rgba(50,120,220,0.15);border-top:none;border-radius:0 0 28px 28px;padding:24px 28px 28px;}
.rb-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:22px;}
.rb-stat{background:rgba(42,127,255,0.06);border:1px solid rgba(42,127,255,0.14);border-radius:14px;padding:14px 8px;text-align:center;}
